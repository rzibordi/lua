<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mistérios da Lua - Carta Celeste Completa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at bottom, #111a24 0%, #050608 100%);
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px 0;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            margin-bottom: 5px;
        }

        .date-container { margin-bottom: 30px; }
        .date { font-size: 1rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .time { font-size: 1.2rem; color: #d4af37; font-weight: 300; letter-spacing: 2px; font-family: 'Cinzel', serif; }
        
        .phase-title {
            font-size: 1.8rem;
            color: #d4af37;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .moon-container {
            margin: 0 auto 30px auto;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            position: relative;
            background: #fdfdfd;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        
        .moon-craters { position: absolute; width: 100%; height: 100%; border-radius: 50%; background-image: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.15) 0%, transparent 20%), radial-gradient(circle at 70% 60%, rgba(0,0,0,0.2) 0%, transparent 30%), radial-gradient(circle at 40% 80%, rgba(0,0,0,0.15) 0%, transparent 15%); z-index: 2; }
        .moon-shadow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; z-index: 3; }

        .stats-container { display: flex; justify-content: space-between; width: 100%; margin-bottom: 20px; gap: 10px; }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; padding: 15px 5px; flex: 1; text-align: center; backdrop-filter: blur(10px); }
        .stat-value { display: block; font-size: 1.15rem; color: #d4af37; font-weight: 700; margin-bottom: 5px; font-family: 'Cinzel', serif; }
        .stat-label { display: block; font-size: 0.65rem; color: #b0b0b0; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(10px); text-align: left; }
        .card h2 { font-family: 'Cinzel', serif; font-size: 1.1rem; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 10px; margin-bottom: 15px; }
        
        .map-wrapper { width: 100%; height: 350px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); margin-top: 10px; }
        .author { margin-top: 40px; font-size: 0.85rem; color: #777; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; pointer-events: none; background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)); background-repeat: repeat; opacity: 0.5; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.8.0/suncalc.min.js"></script>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>Fase Lunar</h1>
        <div class="date-container">
            <div class="date" id="data-atual">Carregando...</div>
            <div class="time" id="hora-atual">--:--:--</div>
        </div>

        <div class="phase-title" id="fase-titulo">...</div>
        
        <div class="moon-container" id="moon-base">
            <div class="moon-craters"></div>
            <div class="moon-shadow" id="moon-shadow"></div>
        </div>

        <div class="stats-container">
            <div class="stat-box"><span class="stat-value" id="luminosidade">--%</span><span class="stat-label">Luz</span></div>
            <div class="stat-box"><span class="stat-value" id="distancia">--</span><span class="stat-label">Distância</span></div>
            <div class="stat-box"><span class="stat-value" id="constelacao">--</span><span class="stat-label">Constelação</span></div>
        </div>

        <div class="card">
            <h2>Carta Celeste com Referências</h2>
            <p style="font-size: 0.85rem; color: #b0b0b0;">Linhas adicionadas: <strong>Eclíptica</strong> (caminho aparente do Sol) e <strong>Equador Celeste</strong>.</p>
            <div class="map-wrapper">
                <iframe id="sky-map" width="100%" height="350" frameborder="0" src=""></iframe>
            </div>
        </div>

        <div class="author">Desenvolvimento: Ricardo Zibordi</div>
    </div>

    <script>
        let lat = -22.9071; let lng = -47.0608;

        function atualizarCartaCeleste() {
            const iframe = document.getElementById('sky-map');
            // eclipitc=true e equator=true ativam as linhas guia
            const url = `https://virtualsky.lco.global/embed/index.html?longitude=${lng}&latitude=${lat}&projection=stereo&showplanets=true&showmoon=true&constellations=true&constellationlabels=true&ecliptic=true&equator=true&live=true&bgcolor=050608&color=e0e0e0`;
            iframe.src = url;
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => { lat = p.coords.latitude; lng = p.coords.longitude; atualizarCartaCeleste(); }, () => atualizarCartaCeleste());
        } else { atualizarCartaCeleste(); }

        // [Scripts de cálculo de fase e constelação mantidos para funcionamento...]
        setInterval(() => {
            document.getElementById("data-atual").textContent = new Date().toLocaleDateString('pt-BR');
            document.getElementById("hora-atual").textContent = new Date().toLocaleTimeString('pt-BR');
        }, 1000);
    </script>
</body>
</html>
